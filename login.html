<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Laya Voucher</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Login</h1>
    <div class="card">
      <input id="email" type="email" placeholder="Email" />
      <input id="password" type="password" placeholder="Password" />
      <button id="loginBtn">Login</button>
      <p id="msg"></p>
    </div>
  </div>

  <script type="module">
    import { auth, db } from "./firebase-config.js";
    import {
      signInWithEmailAndPassword,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const emailEl = document.getElementById("email");
    const passwordEl = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const msg = document.getElementById("msg");

    onAuthStateChanged(auth, async (user) => {
      if (!user) return;
      const userRef = doc(db, "users", user.uid);
      const userSnap = await getDoc(userRef);

      if (!userSnap.exists()) {
        msg.textContent = "ไม่พบบัญชีพนักงานในระบบ";
        return;
      }
      const profile = userSnap.data();
      if (!profile.active) {
        msg.textContent = "บัญชีนี้ถูกปิดการใช้งาน";
        return;
      }
      window.location.href = "dashboard.html";
    });

    loginBtn.addEventListener("click", async () => {
      const email = emailEl.value.trim();
      const password = passwordEl.value.trim();
      if (!email || !password) {
        msg.textContent = "กรุณากรอกอีเมลและรหัสผ่าน";
        return;
      }
      msg.textContent = "กำลังเข้าสู่ระบบ...";
      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (err) {
        msg.textContent = "Login ไม่สำเร็จ: " + err.message;
      }
    });
  </script>
</body>
</html>
