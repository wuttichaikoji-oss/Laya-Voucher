<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Laya Voucher</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Login</h1>
    <div class="card">
      <input id="employeeId" type="text" placeholder="รหัสพนักงาน" />
      <input id="password" type="password" placeholder="รหัสผ่าน" />
      <button id="loginBtn">Login</button>
      <p id="msg"></p>
      <p><a href="register.html">สมัครสมาชิกใหม่</a></p>
    </div>
  </div>

  <script type="module">
    import { auth, db } from "./firebase-config.js";
    import {
      signInWithEmailAndPassword,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import {
      doc,
      getDoc
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const employeeIdEl = document.getElementById("employeeId");
    const passwordEl = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const msg = document.getElementById("msg");

    async function findLoginIndex(employeeId) {
      const ref = doc(db, "employee_login_index", employeeId);
      const snap = await getDoc(ref);
      if (!snap.exists()) return null;
      return snap.data();
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) return;

      const userRef = doc(db, "users", user.uid);
      const userSnap = await getDoc(userRef);

      if (!userSnap.exists()) {
        msg.textContent = "ไม่พบบัญชีพนักงานในระบบ";
        return;
      }

      const profile = userSnap.data();
      if (!profile.active) {
        msg.textContent = "บัญชีนี้ถูกปิดการใช้งาน";
        return;
      }

      window.location.href = "dashboard.html";
    });

    loginBtn.addEventListener("click", async () => {
      const employeeId = employeeIdEl.value.trim().toUpperCase();
      const password = passwordEl.value.trim();

      if (!employeeId || !password) {
        msg.textContent = "กรุณากรอกรหัสพนักงานและรหัสผ่าน";
        return;
      }

      msg.textContent = "กำลังเข้าสู่ระบบ...";

      try {
        const loginIndex = await findLoginIndex(employeeId);

        if (!loginIndex) {
          msg.textContent = "ไม่พบรหัสพนักงานนี้ในระบบ";
          return;
        }

        if (!loginIndex.active) {
          msg.textContent = "บัญชีนี้ถูกปิดการใช้งาน";
          return;
        }

        if (!loginIndex.email) {
          msg.textContent = "บัญชีนี้ยังไม่ได้ผูกอีเมล";
          return;
        }

        await signInWithEmailAndPassword(auth, loginIndex.email, password);
      } catch (err) {
        msg.textContent = "Login ไม่สำเร็จ: " + err.message;
      }
    });
  </script>
</body>
</html>
